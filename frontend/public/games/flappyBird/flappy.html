<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Flappy Block - GameHub</title>
    <link rel="stylesheet" href="../common-game.css">
    <link rel='stylesheet' type='text/css' media='screen' href='flappy.css'>
    <style>
        :root {
            --primary: #4ade80;
        }

        body {
            background: #050508;
            overflow: hidden;
        }

        #board {
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 50px rgba(74, 222, 128, 0.1);
            max-width: 100%;
            height: auto;
            background: #000;
        }

        .controls-alt {
            margin-top: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem;
            color: #4b5563;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .header-alt {
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>

<body class="game-wrapper">
    <div class="bg-glow"></div>

    <header class="header-alt">
        <h1 class="glow-text" style="color: #4ade80; font-size: 3rem;">FLAPPY <span style="color:white">BLOCK</span>
        </h1>
    </header>

    <div class="glass-ui flex flex-col items-center">
        <canvas id="board"></canvas>

        <div class="flex gap-4 mt-8">
            <button onclick="window.restartGame()" class="neon-btn"
                style="background: #4ade80; box-shadow: 0 0 20px rgba(74, 222, 128, 0.4); color: black;">Re-Activate</button>
            <button id="muteButton" onclick="window.toggleMute()"
                class="bg-white/5 border border-white/10 text-gray-400 px-6 py-3 rounded-xl font-orbitron text-[10px] uppercase font-bold tracking-widest hover:bg-white/10 transition-all">Mute
                System</button>
        </div>

        <p class="controls-alt">Press Space • Up Arrow • X to Initiate Pulse</p>
    </div>

    <audio id="jumpSound" src="jump.wav"></audio>
    <audio id="collisionSound" src="collision.wav"></audio>

    <script type="module" src='flappy.js'></script>
</body>

</html>
