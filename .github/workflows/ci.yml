# ============================================================
# GameHub CI/CD Pipeline — Cosmic-Grade Stability
# Issue #351
# Runs on every Pull Request targeting main branch
# ============================================================

name: GameHub CI — Cosmic Stability Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  # ============================================================
  # JOB 1: Frontend Validation (Node.js + Vite)
  # ============================================================
  frontend-ci:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build Production Bundle (Vite)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ============================================================
  # JOB 2: Backend Validation (Python + Django)
  # ============================================================
  backend-ci:
    name: Backend — Django Configuration Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Django Configuration Check
        run: python manage.py check
        env:
          DJANGO_SETTINGS_MODULE: gamehub_project.settings
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: 'True'

      - name: Django Migration Check (No DB)
        run: python manage.py migrate --run-syncdb --check
        env:
          DJANGO_SETTINGS_MODULE: gamehub_project.settings
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: 'True'
        continue-on-error: true

  # ============================================================
  # JOB 3: CI Summary Status Gate
  # ============================================================
  ci-status:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    if: always()

    steps:
      - name: Evaluate CI Results
        run: |
          echo "Frontend Status: ${{ needs.frontend-ci.result }}"
          echo "Backend Status:  ${{ needs.backend-ci.result }}"

          if [[ "${{ needs.frontend-ci.result }}" == "failure" || "${{ needs.backend-ci.result }}" == "failure" ]]; then
            echo "❌ CI FAILED — One or more cosmic checks did not pass."
            exit 1
          else
            echo "✅ CI PASSED — All systems nominal. Ready for merge."
          fi
